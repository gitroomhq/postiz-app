name: gitleaks
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # daily sweep ~02:00 ET

permissions:
  contents: read
  pull-requests: read  # gitleaks-action lists PR commits via /pulls/:n/commits

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
